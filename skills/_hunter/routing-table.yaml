master_orchestrator: skills/_hunter/_hunter-orchestrator.yaml

domain_routing:
  ai: "Chatbot, LLM endpoint, RAG, prompt injection surface → skills/ai/"
  api: "REST/JSON/GraphQL/gRPC, structured responses, auth headers → skills/api/_orchestrator/"
  auth: "OAuth flow, JWT tokens, SSO, login page → skills/auth/_orchestrator/"
  cloud: "Cloud provider metadata, IAM, storage buckets → skills/cloud/"
  devtools: "Browser devtools, network analysis, Playwright → skills/devtools/"
  mcp: "MCP server, tool routing, agentic abuse → skills/devtools/"
  network: "Infrastructure, cloud metadata, K8s, DNS → skills/network/"
  recon: "Unknown target, need tech fingerprinting, subdomain discovery → skills/recon/"
  reporting: "Document findings, generate reports → skills/reporting/"
  web: "URL has HTML, browser context, form-based, session cookies → skills/web/_orchestrator/"

invocation_flow:
- "phase-0: categorize target → route to domain orchestrator"
- "phase-1a: recon network/stack (recon-01, recon-02, recon-03)"
- "phase-1b: recon surface mapping (recon-04, recon-05, recon-06)"
- "phase-1c: recon defense analysis (recon-07, recon-08, recon-09, recon-10, recon-11)"
- "phase-2: consult recon-decision-matrix.yaml → select agents by signal match"
- "phase-3: targeted exploit per agent (confirm → parameters → payloads)"
- "phase-4: chain & escalate via matrix escalation_paths"
- "phase-5: report findings"

cross_domain_chains:
- "SSRF (web-27) → cloud metadata (cloud-01) → IAM keys"
- "XSS (web-16) → OAuth token theft (auth-02) → ATO"
- "SQLi (web-01) → OS shell (web-37) → full compromise"
- "IDOR (web-23) + API BOLA (api-04) → mass data exposure"
- "Open Redirect (web-28) → OAuth redirect_uri bypass (auth-02) → token theft"
- "Prototype Pollution (web-08) → XSS (web-16) → session hijack"
- "CORS misconfig (recon-10) + XSS (web-16) → data exfiltration"
- "Weak CSP (recon-09) → XSS (web-16) → session hijack"
- "No WAF on endpoint (recon-07) → all injection attacks"
- "Shadow API (recon-11) → auth bypass (web-77) → admin access"
